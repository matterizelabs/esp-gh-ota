name: Build

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: espressif/idf:v6.0.2
      env:
        IDF_PATH: /opt/esp/idf
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py build
