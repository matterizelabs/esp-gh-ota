name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Setup ESP-IDF v6.0.2
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.2
          target: esp32
          path: advanced_https_ota

      - name: Build firmware
        working-directory: advanced_https_ota
        run: idf.py build -DPROJECT_VER="${VERSION}"

      - name: Create release and upload
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.TAG }}"
          tag_name: "${{ env.TAG }}"
          files: |
            advanced_https_ota/build/advanced_https_ota.bin
          draft: false
          prerelease: false
